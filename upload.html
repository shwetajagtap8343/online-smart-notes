<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Notes - MLA Notes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <div class="sidebar">
    <h2>My Notes</h2>
    <ul>
      <li onclick="location.href='dashboard.html'">Dashboard</li>
      <li class="active">Upload Notes</li>
      <li onclick="location.href='myNotes.html'">My Notes</li>
      <li onclick="location.href='bookmarks.html'">Bookmarks</li>
    </ul>
  </div>

  <div class="main">
    <div class="upload-box">
      <h2>Upload Notes</h2>
      <input type="text" id="title" placeholder="Title">
      <textarea id="content" placeholder="Write your notes..."></textarea>
      <button onclick="addNote()">Upload</button>
    </div>
  </div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];

function addNote(){
  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;
  if(!title||!content){alert("Fill all fields"); return;}
  notes.push({title,content});
  localStorage.setItem("notes", JSON.stringify(notes));
  alert("Note Added!");
  document.getElementById("title").value="";
  document.getElementById("content").value="";
}
</script>
</body>
</html>
