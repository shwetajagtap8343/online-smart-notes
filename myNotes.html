<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Notes - MLA Notes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <div class="sidebar">
    <h2>My Notes</h2>
    <ul>
      <li onclick="location.href='dashboard.html'">Dashboard</li>
      <li onclick="location.href='upload.html'">Upload Notes</li>
      <li class="active">My Notes</li>
      <li onclick="location.href='bookmarks.html'">Bookmarks</li>
    </ul>
  </div>

  <div class="main">
    <h2>My Notes</h2>
    <div id="myNotesContainer" class="notes-grid"></div>
  </div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];
let container = document.getElementById("myNotesContainer");
container.innerHTML="";
notes.forEach((note)=>{
  container.innerHTML += `<div class="note">
    <h3>${note.title}</h3>
    <p>${note.content}</p>
  </div>`;
});
</script>
</body>
</html>
