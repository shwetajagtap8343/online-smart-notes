<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bookmarks - MLA Notes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <div class="sidebar">
    <h2>My Notes</h2>
    <ul>
      <li onclick="location.href='dashboard.html'">Dashboard</li>
      <li onclick="location.href='upload.html'">Upload Notes</li>
      <li onclick="location.href='myNotes.html'">My Notes</li>
      <li class="active">Bookmarks</li>
    </ul>
  </div>

  <div class="main">
    <h2>Bookmarks</h2>
    <div id="bookmarkContainer" class="notes-grid"></div>
  </div>
</div>

<script>
let bookmarks = JSON.parse(localStorage.getItem("bookmarks")) || [];
let container = document.getElementById("bookmarkContainer");
container.innerHTML="";
bookmarks.forEach((note)=>{
  container.innerHTML += `<div class="note">
    <h3>${note.title}</h3>
    <p>${note.content}</p>
  </div>`;
});
</script>
</body>
</html>
